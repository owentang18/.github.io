<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>上海野生动物园 · 软件驿站</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动/选中，类似原站视觉效果，不影响交互 */
        }

        /* 全局变量 – 毛玻璃 & 柔和色调 */
        :root {
            --bg-gradient-start: #f8faff;
            --bg-gradient-end: #eef2ff;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            --btn-bg: rgba(255, 255, 255, 0.75);
            --badge-hot: linear-gradient(135deg, #ff7e5e, #ff6a4b);
            --border-light: rgba(0, 0, 0, 0.08);
            --particle-color: rgba(100, 108, 255, 0.5);
            --tag-active-bg: #3b82f6;
            --tag-active-text: white;
            --tag-inactive-bg: rgba(255,255,255,0.6);
            --transition: all 0.25s ease;
        }

        body.dark-mode {
            --bg-gradient-start: #0a0f1c;
            --bg-gradient-end: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(51, 65, 85, 0.6);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --card-bg: rgba(30, 41, 59, 0.85);
            --card-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            --btn-bg: rgba(30, 41, 59, 0.7);
            --border-light: rgba(255, 255, 255, 0.1);
            --particle-color: rgba(139, 148, 255, 0.7);
            --tag-inactive-bg: rgba(51, 65, 85, 0.7);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.2s;
            backdrop-filter: blur(0px);
            margin: 0;
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* 画布粒子背景层 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.8rem 2rem 3rem;
        }

        /* 头部 + 毛玻璃效果 */
        .glass-header {
            backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: var(--transition);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            width: 42px;
            height: 42px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.7rem;
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
        }

        .logo-text h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(120deg, #4f46e5, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo-text p {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .theme-toggle {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(4px);
            color: var(--text-primary);
        }
        .theme-toggle i {
            margin-right: 6px;
        }

        /* 搜索栏 */
        .search-section {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .search-wrapper {
            flex: 3;
            min-width: 200px;
            display: flex;
            background: var(--btn-bg);
            border-radius: 60px;
            border: 1px solid var(--border-light);
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            outline: none;
            color: var(--text-primary);
        }
        .search-wrapper button {
            background: transparent;
            border: none;
            padding: 0 20px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .search-wrapper button:hover { color: #4f46e5; }
        
        .engine-group {
            display: flex;
            gap: 8px;
            background: var(--btn-bg);
            padding: 4px 12px;
            border-radius: 48px;
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-light);
        }
        .engine-btn {
            background: transparent;
            border: none;
            padding: 8px 18px;
            border-radius: 32px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            color: var(--text-secondary);
        }
        .engine-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }

        /* 分类标签栏 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 2rem 0 1.8rem;
            justify-content: center;
        }
        .cat-tag {
            background: var(--tag-inactive-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-light);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .cat-tag.active {
            background: var(--tag-active-bg);
            border-color: transparent;
            color: white;
            box-shadow: 0 6px 14px rgba(59,130,246,0.3);
        }
        .cat-tag:hover {
            transform: translateY(-2px);
            background: #4f46e5;
            color: white;
        }

        /* 统计栏 */
        .info-stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stats-count {
            font-size: 0.9rem;
            opacity: 0.8;
            background: var(--glass-bg);
            padding: 5px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        /* 卡片网格 – 3D悬停效果 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            padding: 1.3rem;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
            border-color: rgba(129, 140, 248, 0.6);
        }
        .card-icon {
            width: 58px;
            height: 58px;
            background: var(--icon-bg, #4f46e5);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            color: white;
            margin-bottom: 1rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .card h3 {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            font-size: 0.65rem;
            background: var(--badge-hot);
            padding: 2px 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
        }
        .card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0.5rem 0 1rem;
            line-height: 1.4;
        }
        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
        }
        .download-btn {
            background: rgba(79, 70, 229, 0.2);
            border: none;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            color: var(--text-primary);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .download-btn:hover {
            background: #4f46e5;
            color: white;
            transform: scale(0.96);
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 1.5rem;
            font-size: 0.8rem;
            opacity: 0.7;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .glass-header { padding: 1rem; }
            .search-section { flex-direction: column; align-items: stretch; }
            .engine-group { justify-content: center; }
            .categories { gap: 8px; }
            .cat-tag { font-size: 0.75rem; padding: 5px 14px; }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--glass-bg);
            border-radius: 2rem;
            backdrop-filter: blur(8px);
        }
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="container">
        <div class="glass-header">
            <div class="header-top">
                <div class="logo-area">
                    <div class="logo-icon"><i class="fas fa-paw"></i></div>
                    <div class="logo-text">
                        <h1>上海野生动物园</h1>
                        <p>智慧园区 · 软件驿站</p>
                    </div>
                </div>
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i> 深色模式
                </div>
            </div>
            <div class="search-section">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="搜索任意资源、教程或软件..." autocomplete="off">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <div class="engine-group" id="engineGroup">
                    <button data-engine="baidu" class="engine-btn active">百度</button>
                    <button data-engine="bing" class="engine-btn">必应</button>
                    <button data-engine="google" class="engine-btn">谷歌</button>
                </div>
            </div>
        </div>

        <!-- 分类选项卡容器（动态生成） -->
        <div class="categories" id="categoriesContainer"></div>

        <div class="info-stats">
            <span class="stats-count" id="statsCount">加载中...</span>
        </div>

        <!-- 卡片网格 -->
        <div class="grid-container" id="cardsGrid"></div>

        <footer>
            <p>✨ 汇聚实用工具 · 自然灵感办公 ✨<br>© 上海野生动物园 | 资源来自官方渠道，安全无忧</p>
        </footer>
    </div>

    <script>
        // ----------------------------- 软件数据（增加飞书、钉钉、Everything、ToDesk）---------------------------------
        const DATA = [
            // 原有游戏平台
            { name: "Steam", desc: "全球最大的PC游戏平台，海量正版游戏社区", cat: "game", icon: "fab fa-steam", bg: "#171a21", url: "https://store.steampowered.com/", badge: "热门" },
            { name: "Epic Games", desc: "每周免费游戏，虚幻引擎大本营", cat: "game", icon: "fab fa-fort-awesome", bg: "#2c2c2c", url: "https://store.epicgames.com/", badge: "" },
            // 社交通讯 - 新增飞书、钉钉
            { name: "Discord", desc: "游戏语音与玩家社区，低延迟通讯", cat: "social", icon: "fab fa-discord", bg: "#5865F2", url: "https://discord.com/", badge: "热门" },
            { name: "微信", desc: "国民级社交应用，工作生活必备", cat: "social", icon: "fab fa-weixin", bg: "#07C160", url: "https://weixin.qq.com/", badge: "" },
            { name: "QQ", desc: "经典即时通讯，强大文件传输", cat: "social", icon: "fab fa-qq", bg: "#12B7F5", url: "https://im.qq.com/", badge: "" },
            { name: "Telegram", desc: "加密聊天，频道机器人生态", cat: "social", icon: "fab fa-telegram", bg: "#26A5E4", url: "https://telegram.org/", badge: "" },
            { name: "飞书", desc: "字节跳动出品，高效协作与文档一体化", cat: "social", icon: "fa-regular fa-building", bg: "#0175C2", url: "https://www.feishu.cn/", badge: "热门" },
            { name: "钉钉", desc: "阿里巴巴智能移动办公平台，考勤审批一站式", cat: "social", icon: "fab fa-dingtalk", bg: "#1E88E5", url: "https://www.dingtalk.com/", badge: "" },
            // 下载工具
            { name: "Internet Download Manager", desc: "顶级多线程下载器，提速5倍", cat: "download", icon: "fas fa-download", bg: "#1E88E5", url: "https://www.internetdownloadmanager.com/", badge: "热门" },
            { name: "qBittorrent", desc: "开源BT下载，无广告纯净", cat: "download", icon: "fas fa-magnet", bg: "#2E8B57", url: "https://www.qbittorrent.org/", badge: "" },
            { name: "迅雷", desc: "国内高速下载，支持云盘", cat: "download", icon: "fas fa-cloud-download-alt", bg: "#E30B0B", url: "https://www.xunlei.com/", badge: "" },
            // 办公软件 （新增 Everything 文件搜索神器）
            { name: "WPS Office", desc: "兼容微软Office，轻量高效", cat: "office", icon: "fas fa-file-alt", bg: "#E6482F", url: "https://www.wps.cn/", badge: "" },
            { name: "Microsoft 365", desc: "正版Office全家桶，云端协同", cat: "office", icon: "fas fa-microsoft", bg: "#F25022", url: "https://www.microsoft.com/zh-cn/microsoft-365", badge: "" },
            { name: "Notion", desc: "全能笔记+数据库，团队协作利器", cat: "office", icon: "fas fa-clipboard-list", bg: "#000000", url: "https://www.notion.so/", badge: "热门" },
            { name: "Everything", desc: "极速文件搜索神器，秒级定位本地文件", cat: "office", icon: "fas fa-search", bg: "#1F7B4D", url: "https://www.voidtools.com/zh-cn/", badge: "热门" },
            // 视频软件
            { name: "PotPlayer", desc: "极致解码视频播放器，低占用", cat: "video", icon: "fas fa-film", bg: "#2980b9", url: "http://www.potplayercn.com/", badge: "" },
            { name: "VLC", desc: "开源万能播放器，全平台支持", cat: "video", icon: "fas fa-play-circle", bg: "#F4A261", url: "https://www.videolan.org/vlc/", badge: "" },
            // 浏览器
            { name: "Chrome", desc: "Google高速浏览器，扩展生态丰富", cat: "browser", icon: "fab fa-chrome", bg: "#4285F4", url: "https://www.google.com/chrome/", badge: "热门" },
            { name: "Firefox", desc: "开源隐私浏览器，定制性强", cat: "browser", icon: "fab fa-firefox", bg: "#FF7139", url: "https://www.mozilla.org/firefox/", badge: "" },
            { name: "Microsoft Edge", desc: "基于Chromium，完美同步微软生态", cat: "browser", icon: "fab fa-edge", bg: "#0078D7", url: "https://www.microsoft.com/edge", badge: "" },
            // 驱动工具
            { name: "Driver Booster", desc: "一键更新驱动，游戏优化必备", cat: "driver", icon: "fas fa-microchip", bg: "#FFA500", url: "https://www.iobit.com/en/driver-booster.php", badge: "热门" },
            { name: "驱动精灵", desc: "国内驱动管理，硬件检测", cat: "driver", icon: "fas fa-tools", bg: "#1296db", url: "https://www.drivergenius.com/", badge: "" },
            { name: "GeForce Experience", desc: "N卡驱动更新与游戏优化", cat: "driver", icon: "fab fa-nvidia", bg: "#76B900", url: "https://www.nvidia.com/geforce/geforce-experience/", badge: "" },
            // 热门软件 (新增 ToDesk 远程控制)
            { name: "Adobe Creative Cloud", desc: "设计神器PS/AE/PR聚合", cat: "hot", icon: "fab fa-adobe", bg: "#FD0000", url: "https://www.adobe.com/creativecloud.html", badge: "热门" },
            { name: "Figma", desc: "在线UI设计协作神器", cat: "hot", icon: "fab fa-figma", bg: "#F24E1E", url: "https://www.figma.com/", badge: "" },
            { name: "Visual Studio Code", desc: "地表最强代码编辑器", cat: "hot", icon: "fas fa-code", bg: "#007ACC", url: "https://code.visualstudio.com/", badge: "热门" },
            { name: "ToDesk", desc: "远程控制利器，流畅安全跨设备办公", cat: "hot", icon: "fas fa-desktop", bg: "#F37335", url: "https://www.todesk.com/", badge: "热门" }
        ];

        // 分类定义 (key与上面cat匹配)
        const CATS = [
            { key: "all", label: "🌟 全部" },
            { key: "game", label: "🎮 游戏平台" },
            { key: "social", label: "💬 社交通讯" },
            { key: "download", label: "⬇️ 下载工具" },
            { key: "office", label: "📁 办公软件" },
            { key: "video", label: "🎬 视频软件" },
            { key: "browser", label: "🌐 浏览器" },
            { key: "driver", label: "🔧 驱动工具" },
            { key: "hot", label: "🔥 热门软件" }
        ];

        // 搜索引擎配置
        const ENGINES = {
            baidu: "https://www.baidu.com/s?wd=",
            bing: "https://www.bing.com/search?q=",
            google: "https://www.google.com/search?q="
        };

        let currentCat = "all";
        let currentEngine = "baidu";
        
        // ----- DOM 元素 -----
        const cardsGrid = document.getElementById("cardsGrid");
        const categoriesContainer = document.getElementById("categoriesContainer");
        const statsCountSpan = document.getElementById("statsCount");
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");
        const themeToggle = document.getElementById("themeToggle");

        // ----- 辅助函数 -----
        function renderCards() {
            let filtered = DATA.filter(item => currentCat === "all" || item.cat === currentCat);
            if (filtered.length === 0) {
                cardsGrid.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i>  <span>暂无该类别的软件，试试其他分类吧~</span></div>`;
                statsCountSpan.innerText = `📦 0 个链接`;
                return;
            }
            let html = "";
            filtered.forEach(app => {
                let badgeHtml = app.badge ? `<span class="badge">${app.badge}</span>` : "";
                let iconHtml = app.icon ? `<i class="${app.icon}"></i>` : `<i class="fas fa-cube"></i>`;
                html += `
                    <div class="card">
                        <div class="card-icon" style="background: ${app.bg}">
                            ${iconHtml}
                        </div>
                        <h3>${escapeHtml(app.name)} ${badgeHtml}</h3>
                        <p>${escapeHtml(app.desc)}</p>
                        <div class="card-footer">
                            <a href="${app.url}" target="_blank" rel="noopener noreferrer" class="download-btn">
                                <i class="fas fa-download"></i> 访问官网
                            </a>
                        </div>
                    </div>
                `;
            });
            cardsGrid.innerHTML = html;
            statsCountSpan.innerText = `📦 共 ${filtered.length} 个实用链接`;
        }
        
        // 简单的防XSS
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // 生成分类按钮
        function buildCategories() {
            let btnsHtml = "";
            CATS.forEach(cat => {
                let activeClass = (currentCat === cat.key) ? "active" : "";
                btnsHtml += `<div class="cat-tag ${activeClass}" data-cat="${cat.key}">${cat.label}</div>`;
            });
            categoriesContainer.innerHTML = btnsHtml;
            // 绑定事件
            document.querySelectorAll(".cat-tag").forEach(el => {
                el.addEventListener("click", (e) => {
                    const catKey = el.getAttribute("data-cat");
                    if (catKey) {
                        currentCat = catKey;
                        buildCategories();    // 刷新active样式
                        renderCards();
                    }
                });
            });
        }

        // 搜索引擎切换
        function initEngineSwitcher() {
            const btns = document.querySelectorAll(".engine-btn");
            btns.forEach(btn => {
                btn.addEventListener("click", () => {
                    const eng = btn.getAttribute("data-engine");
                    if (eng && ENGINES[eng]) {
                        currentEngine = eng;
                        btns.forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                    }
                });
            });
        }

        // 执行外部搜索
        function doExternalSearch() {
            let keyword = searchInput.value.trim();
            if (keyword === "") {
                keyword = "上海野生动物园 科技工具";
            }
            const searchUrl = ENGINES[currentEngine] + encodeURIComponent(keyword);
            window.open(searchUrl, "_blank");
        }

        // ---------- 粒子背景 (动态交互 + 深色模式适配) ----------
        let canvas, ctx, particles = [], mouseX = 0, mouseY = 0, animationId;
        
        function initParticles() {
            canvas = document.getElementById("bgCanvas");
            ctx = canvas.getContext("2d");
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", () => {
                resizeCanvas();
                initParticleArray();
            });
            resizeCanvas();

            function initParticleArray() {
                particles = [];
                let num = Math.min(90, Math.floor(window.innerWidth * window.innerHeight / 9000));
                for (let i = 0; i < num; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 3 + 1.5,
                        vx: (Math.random() - 0.5) * 0.35,
                        vy: (Math.random() - 0.5) * 0.35,
                        alpha: Math.random() * 0.5 + 0.2
                    });
                }
            }
            initParticleArray();

            function updateParticles() {
                for (let p of particles) {
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 100 && mouseX > 0 && mouseY > 0) {
                        const force = (100 - dist) / 100 * 1.2;
                        const angle = Math.atan2(dy, dx);
                        p.vx += Math.cos(angle) * force * 0.2;
                        p.vy += Math.sin(angle) * force * 0.2;
                    }
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -20) p.x = canvas.width + 20;
                    if (p.x > canvas.width + 20) p.x = -20;
                    if (p.y < -20) p.y = canvas.height + 20;
                    if (p.y > canvas.height + 20) p.y = -20;
                }
            }

            function drawParticles() {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let currentColor = getComputedStyle(document.body).getPropertyValue('--particle-color').trim();
                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = currentColor;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = currentColor;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            function animate() {
                updateParticles();
                drawParticles();
                animationId = requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener("mousemove", (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            window.addEventListener("mouseleave", () => { mouseX = -1000; mouseY = -1000; });
        }

        // 主题切换 & 更新粒子颜色
        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            const isDark = document.body.classList.contains("dark-mode");
            const toggleBtn = document.getElementById("themeToggle");
            if (isDark) {
                toggleBtn.innerHTML = '<i class="fas fa-sun"></i> 浅色模式';
            } else {
                toggleBtn.innerHTML = '<i class="fas fa-moon"></i> 深色模式';
            }
        }

        // 监听主题切换按钮
        themeToggle.addEventListener("click", toggleTheme);
        
        // 搜索事件绑定
        searchBtn.addEventListener("click", doExternalSearch);
        searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") doExternalSearch();
        });

        // 初始化整个UI
        function init() {
            buildCategories();
            renderCards();
            initEngineSwitcher();
            initParticles();     // 开启粒子魔法
        }

        init();
    </script>
</body>
</html>
